# ~/.tmux.conf

# --- Modern color support (24-bit truecolor) ---
# Advertise a 256-color capable terminal to programs inside tmux.
set -g default-terminal "tmux-256color"
# Tell tmux the OUTER terminal supports RGB/truecolor and clipboard (OSC52).
# terminal-features is the modern (tmux >= 3.2) replacement for terminal-overrides.
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:clipboard"

# --- OSC52 clipboard passthrough ---
# Let tmux set the system clipboard AND forward clipboard-set requests from
# applications running inside tmux out to the parent terminal via OSC52.
set -g set-clipboard on
# Allow raw escape-sequence passthrough so apps can emit OSC52 themselves.
set -g allow-passthrough on

set -g mode-keys vi
bind-key v copy-mode

bind-key S-Left swap-window -d -t -1
bind-key S-Right swap-window -d -t +1

set -g mouse on

# Switch panes using Prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g @small_width 90
set -g display-time 1000

set-hook -g client-resized \
  'if -F "#{e|<:#{client_width},#{@small_width}}" \
     "set -g status off" \
     "set -g status on"'


set -g status-left-length 50

if -F "#{e|<:#{client_width},#{@small_width}}" \
  "set -g status off" \
  "set -g status on ; \
    set -g status-left \"#S - \" ; \
    set -g window-status-format \"#I:#W\" ; \
    set -g window-status-current-format \"#[reverse][#I:#W]#[default]\" ; \
    set -gF status-right \"#{b:pane_current_path}  %H:%M\""

set-hook -g session-window-changed \
  'if -F "#{e|<:#{client_width},#{@small_width}}" \
     "display-message -d 800 \"#S - #I:#{?window_name,#{window_name},#{pane_title}}\"" \
     ""'

unbind C-b
set -g prefix None

bind-key -n C-b 'if -F "#{e|<:#{client_width},#{@small_width}}" \
  "display-message -d 0 \"#S - #I:#{?window_name,#{window_name},#{pane_title}}\" ; switch-client -T prefix" \
  "switch-client -T prefix"'

bind-key C-b last-window
